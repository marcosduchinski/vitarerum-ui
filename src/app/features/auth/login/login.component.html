<main class="login" aria-labelledby="login-title">
  <section class="login__panel">
    <p class="login__eyebrow">Vitarerum UI</p>
    <h1 id="login-title">Sign in</h1>
    <p class="login__summary">Use any email address to enter the learning workspace.</p>

    <label for="email">Email</label>
    <input
      pInputText
      id="email"
      type="email"
      autocomplete="email"
      required
      aria-describedby="login-email-help"
      placeholder="you@example.com"
      [value]="email()"
      (input)="updateEmail($event)"
    />
    <p id="login-email-help" class="login__help">Enter an address with an @ symbol.</p>

    <button
      pButton
      type="button"
      class="login__submit"
      [disabled]="!canEnter()"
      (click)="enterWorkspace()"
    >
      <span pButtonLabel>Enter workspace</span>
    </button>
  </section>
</main>
